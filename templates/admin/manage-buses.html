<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/admin.css">
<title>Fleet — BusBook Admin</title>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fa-solid fa-bus" style="color:#fff;font-size:18px;"></i></div>
      <div><div class="brand-name">BusBook</div><span class="brand-sub">Admin Panel</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <nav>
        <a href="/admin"><span class="nav-icon"><i class="fa-solid fa-gauge-high"></i></span> Dashboard</a>
        <a href="/admin/users" id="navUsers"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Passengers</a>
        <a href="/admin/schedule" id="navSchedule"><span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span> Schedules</a>
        <a href="/admin/buses" id="navBuses"><span class="nav-icon"><i class="fa-solid fa-bus"></i></span> Fleet</a>
        <a href="/admin/revenue" id="navRevenue"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Revenue</a>
        <a href="/admin/bookings-report" id="navReport"><span class="nav-icon"><i class="fa-solid fa-table-list"></i></span> Bookings Report</a>
        <a href="/admin/verify" id="navVerify"><span class="nav-icon"><i class="fa-solid fa-qrcode"></i></span> Verify Ticket</a>
        <a href="/admin/messages"><span class="nav-icon"><i class="fa-solid fa-envelope"></i></span> Messages</a>
      </nav>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Account</div>
      <nav>
        <a href="/profile"><span class="nav-icon"><i class="fa-solid fa-user"></i></span> Profile</a>
        <a href="/book"><span class="nav-icon"><i class="fa-solid fa-eye"></i></span> Passenger View</a>
        <a href="/login" onclick="localStorage.clear()"><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span> Logout</a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">A</div>
        <div><div class="sidebar-user-name" id="sidebarUserName">Administrator</div><div class="sidebar-user-role">Admin</div></div>
      </div>
    </div>
  </aside>
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title">Fleet Management</div>
      <div class="admin-topbar-actions">
        <button class="btn btn-primary" onclick="openModal('busModal')"><i class="fa-solid fa-plus"></i> Add Bus</button>
      </div>
    </div>
    <div class="admin-body">
      <div class="admin-card">
        <div class="admin-card-header">
          <div class="admin-card-title"><i class="fa-solid fa-bus" style="color:var(--brand);"></i> All Buses</div>
          <span class="badge badge-brand" id="busCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Bus Name</th><th>Plate No.</th><th>Seats</th><th>Layout</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="busTableBody"><tr><td colspan="6" style="text-align:center;padding:32px;" class="text-muted">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <footer>BusBook Admin &copy; 2026</footer>
  </div>
</div>

<!-- Add Bus Modal -->
<div class="admin-modal" id="busModal">
  <div class="admin-modal-box">
    <div class="admin-modal-header">
      <div class="admin-modal-title"><i class="fa-solid fa-plus"></i> Add New Bus</div>
      <button class="modal-close-btn" onclick="closeModal('busModal')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="admin-modal-body">
      <div class="admin-form-grid">
        <div class="form-group"><label class="form-label">Bus Name</label><input type="text" id="busName" class="form-control" placeholder="e.g. Ceres Liner 01"></div>
        <div class="form-group"><label class="form-label">Plate Number</label><input type="text" id="plateNumber" class="form-control" placeholder="e.g. ABC-1234"></div>
        <div class="form-group"><label class="form-label">Total Seats</label><input type="number" id="totalSeats" class="form-control" value="40" min="1" max="100"></div>
        <div class="form-group"><label class="form-label">Seat Layout</label>
          <select id="seatLayout" class="form-control">
            <option value="4-column">4-Column (Standard)</option>
            <option value="2-column">2-Column (Mini)</option>
            <option value="3-column">3-Column (Midsize)</option>
          </select>
        </div>
      </div>
    </div>
    <div class="admin-modal-footer">
      <button class="btn btn-outline" onclick="closeModal('busModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddBus()"><i class="fa-solid fa-plus"></i> Add Bus</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/admin.js"></script>
<script>
document.getElementById('navBuses').classList.add('active');

async function loadBusList() {
  const token = localStorage.getItem('access_token')||localStorage.getItem('authToken');
  try {
    const res = await fetch('/api/admin/buses', {headers:{'Authorization':'Bearer '+token}});
    const data = await res.json();
    const buses = data.buses || data || [];
    document.getElementById('busCount').textContent = buses.length + ' buses';
    const tbody = document.getElementById('busTableBody');
    if (!buses.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:32px;" class="text-muted">No buses found. Add one above.</td></tr>'; return; }
    tbody.innerHTML = buses.map(b => `
      <tr>
        <td class="fw-600">${b.bus_name||b.name||'—'}</td>
        <td>${b.plate_number||'—'}</td>
        <td>${b.total_seats||'—'}</td>
        <td>${b.seat_layout||'—'}</td>
        <td><span class="badge badge-${b.is_active!==false?'green':'red'}">${b.is_active!==false?'Active':'Inactive'}</span></td>
        <td style="display:flex;gap:8px;">
          <button class="btn btn-danger btn-sm" onclick="delBus(${b.id})"><i class="fa-solid fa-trash"></i></button>
        </td>
      </tr>`).join('');
  } catch { Toast.error('Failed to load buses.'); }
}

async function submitAddBus() {
  const token = localStorage.getItem('access_token')||localStorage.getItem('authToken');
  const body = { bus_name:document.getElementById('busName').value, plate_number:document.getElementById('plateNumber').value, total_seats:parseInt(document.getElementById('totalSeats').value), seat_layout:document.getElementById('seatLayout').value };
  if (!body.bus_name||!body.plate_number) { Toast.warning('Fill in all fields.'); return; }
  const res = await fetch('/api/admin/buses', {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
  const data = await res.json();
  if (res.ok) { Toast.success('Bus added!'); closeModal('busModal'); loadBusList(); }
  else Toast.error(data.error||'Failed to add bus.');
}

async function delBus(id) {
  if (!confirm('Delete this bus?')) return;
  const token = localStorage.getItem('access_token')||localStorage.getItem('authToken');
  const res = await fetch(`/api/admin/buses/${id}`, {method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  if (res.ok) { Toast.success('Bus deleted.'); loadBusList(); }
  else Toast.error('Could not delete bus.');
}

window.onload = function() {
  const user = JSON.parse(localStorage.getItem('currentUser'));
  if (!user||user.role!=='admin') { window.location.href='/login'; return; }
  renderAdminUser(); loadBusList();
};
</script>
</body>
</html>
