<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/admin.css">
<title>Passengers — BusBook Admin</title>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fa-solid fa-bus" style="color:#fff;font-size:18px;"></i></div>
      <div><div class="brand-name">BusBook</div><span class="brand-sub">Admin Panel</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <nav>
        <a href="/admin"><span class="nav-icon"><i class="fa-solid fa-gauge-high"></i></span> Dashboard</a>
        <a href="/admin/users" id="navUsers"><span class="nav-icon"><i class="fa-solid fa-users"></i></span> Passengers</a>
        <a href="/admin/schedule" id="navSchedule"><span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span> Schedules</a>
        <a href="/admin/buses" id="navBuses"><span class="nav-icon"><i class="fa-solid fa-bus"></i></span> Fleet</a>
        <a href="/admin/revenue" id="navRevenue"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span> Revenue</a>
        <a href="/admin/bookings-report" id="navReport"><span class="nav-icon"><i class="fa-solid fa-table-list"></i></span> Bookings Report</a>
        <a href="/admin/verify" id="navVerify"><span class="nav-icon"><i class="fa-solid fa-qrcode"></i></span> Verify Ticket</a>
        <a href="/admin/messages"><span class="nav-icon"><i class="fa-solid fa-envelope"></i></span> Messages</a>
      </nav>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Account</div>
      <nav>
        <a href="/profile"><span class="nav-icon"><i class="fa-solid fa-user"></i></span> Profile</a>
        <a href="/book"><span class="nav-icon"><i class="fa-solid fa-eye"></i></span> Passenger View</a>
        <a href="/login" onclick="Auth.logout(); return false;"><span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span> Logout</a>
      </nav>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">A</div>
        <div><div class="sidebar-user-name" id="sidebarUserName">Administrator</div><div class="sidebar-user-role">Admin</div></div>
      </div>
    </div>
  </aside>
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-title">Passengers</div>
      <div class="admin-topbar-actions">
        <div class="search-bar">
          <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input type="text" id="userSearch" placeholder="Search passengers…" oninput="filterUsers()">
        </div>
      </div>
    </div>
    <div class="admin-body">
      <div class="admin-card">
        <div class="admin-card-header">
          <div class="admin-card-title"><i class="fa-solid fa-users" style="color:var(--brand);"></i> All Passengers</div>
          <span class="badge badge-brand" id="userCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Passenger</th><th>Email</th><th>Phone</th><th>Role</th><th>Bookings</th><th>Actions</th></tr></thead>
            <tbody id="userTableBody"><tr><td colspan="6" style="text-align:center;padding:32px;" class="text-muted">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
    <footer>BusBook Admin &copy; 2026</footer>
  </div>
</div>
<div id="toast-container"></div>
<script src="/static/js/auth.js"></script>
<script src="/static/js/admin.js"></script>
<script>
let allUsers = [];
document.getElementById('navUsers').classList.add('active');

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  const filtered = allUsers.filter(u => (u.username||u.email||'').toLowerCase().includes(q));
  renderUsers(filtered);
}

function renderUsers(users) {
  const tbody = document.getElementById('userTableBody');
  if (!users.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:32px;" class="text-muted">No users found.</td></tr>'; return; }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:10px;">
        <div style="width:32px;height:32px;background:var(--brand-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--brand-darker);font-size:13px;">${(u.username||u.email||'U')[0].toUpperCase()}</div>
        <span class="fw-600">${u.username||'—'}</span>
      </div></td>
      <td>${u.email||'—'}</td>
      <td>${u.phone||'—'}</td>
      <td><span class="badge badge-${u.role==='admin'?'blue':'brand'}">${u.role}</span></td>
      <td>${u.booking_count||0}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})"><i class="fa-solid fa-trash"></i></button></td>
    </tr>`).join('');
}

async function deleteUser(id) {
  if (!confirm('Delete this user?')) return;
  const token = localStorage.getItem('access_token')||localStorage.getItem('authToken');
  const res = await fetch(`/api/admin/users/${id}`, {method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  if (res.ok) { Toast.success('User deleted.'); loadUserList(); }
  else Toast.error('Could not delete user.');
}

async function loadUserList() {
  const token = localStorage.getItem('access_token')||localStorage.getItem('authToken');
  try {
    const res = await fetch('/api/admin/users', {headers:{'Authorization':'Bearer '+token}});
    const data = await res.json();
    allUsers = data.users || data || [];
    document.getElementById('userCount').textContent = allUsers.length + ' users';
    renderUsers(allUsers);
  } catch { Toast.error('Failed to load users.'); }
}

window.onload = function() {
  const user = JSON.parse(localStorage.getItem('currentUser'));
  if (!user||user.role!=='admin') { window.location.href='/login'; return; }
  renderAdminUser(); loadUserList();
};
</script>
</body>
</html>
