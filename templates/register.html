<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — BusBook</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/user.css">
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: url("https://images.unsplash.com/photo-1544620347-c4fd4a3d5957") no-repeat center center/cover;
  display: flex;
  flex-direction: column;
}
.login-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg,rgba(0,0,0,0.65) 0%,rgba(20,10,0,0.55) 100%);
  z-index: 0;
}
.login-wrap {
  position: relative; z-index: 1;
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
}
.login-card {
  width: 100%; max-width: 440px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 20px;
  padding: 36px 36px 32px;
  color: #fff;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.login-logo {
  text-align: center; margin-bottom: 24px;
}
.login-logo .logo-icon {
  width: 52px; height: 52px; background: var(--brand); border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin: 0 auto 10px;
  box-shadow: 0 4px 16px rgba(244,162,97,0.45);
}
.login-logo h2 {
  font-family: var(--font-display); font-size: 21px; font-weight: 800;
  color: #fff; margin: 0 0 3px;
}
.login-logo p { font-size: 13px; color: rgba(255,255,255,0.6); margin: 0; }

.form-row-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}

.login-field { margin-bottom: 13px; }
.login-field label {
  display: block; font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.7); margin-bottom: 5px;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.login-field .field-wrap { position: relative; }
.login-field .field-wrap i {
  position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
  color: var(--brand); font-size: 13px;
}
.login-field input {
  width: 100%; padding: 11px 13px 11px 37px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 10px; color: #fff; font-size: 14px;
  font-family: var(--font-body); outline: none;
  transition: border-color 0.15s, background 0.15s;
  box-sizing: border-box;
}
.login-field input::placeholder { color: rgba(255,255,255,0.35); }
.login-field input:focus {
  border-color: var(--brand);
  background: rgba(255,255,255,0.15);
}
.login-field input.field-error {
  border-color: #EF4444;
  background: rgba(239,68,68,0.1);
}
.field-err-msg {
  font-size: 11px; color: #fca5a5; margin-top: 3px;
}

.login-btn {
  width: 100%; padding: 13px; margin-top: 6px;
  background: var(--brand); color: #fff; border: none; border-radius: 10px;
  font-family: var(--font-body); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.login-btn:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(244,162,97,0.4); }
.login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

.login-footer {
  text-align: center; margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.6);
}
.login-footer a { color: var(--brand); text-decoration: none; font-weight: 600; }
.login-footer a:hover { text-decoration: underline; }

.error-msg {
  background: rgba(239,68,68,0.18); border: 1px solid rgba(239,68,68,0.35);
  color: #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 13px;
  margin-bottom: 14px; display: none; align-items: center; gap: 8px;
}
.error-msg.show { display: flex; }
.success-msg {
  background: rgba(16,185,129,0.18); border: 1px solid rgba(16,185,129,0.35);
  color: #6ee7b7; border-radius: 8px; padding: 10px 14px; font-size: 13px;
  margin-bottom: 14px; display: none; align-items: center; gap: 8px;
}
.success-msg.show { display: flex; }

.topbar-login {
  position: relative; z-index: 2; display: flex; align-items: center; padding: 16px 28px;
}
.topbar-login a {
  display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.85);
  text-decoration: none; font-size: 14px; font-weight: 600;
}
.topbar-login a:hover { color: #fff; }
</style>
</head>
<body>
<div class="login-overlay"></div>

<div class="topbar-login">
  <a href="/"><i class="fa-solid fa-bus" style="color:var(--brand);"></i> BusBook</a>
</div>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="logo-icon"><i class="fa-solid fa-user-plus" style="color:#fff;"></i></div>
      <h2>Create Account</h2>
      <p>Join BusBook and start booking your rides</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="fa-solid fa-circle-xmark"></i>
      <span id="errorText">Something went wrong.</span>
    </div>
    <div class="success-msg" id="successMsg">
      <i class="fa-solid fa-circle-check"></i>
      <span id="successText">Account created! Redirecting to login…</span>
    </div>

    <div class="form-row-2">
      <div class="login-field">
        <label>First Name *</label>
        <div class="field-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="firstName" placeholder="Juan" autocomplete="given-name">
        </div>
      </div>
      <div class="login-field">
        <label>Last Name *</label>
        <div class="field-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="lastName" placeholder="Dela Cruz" autocomplete="family-name">
        </div>
      </div>
    </div>

    <div class="login-field">
      <label>Email Address *</label>
      <div class="field-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="regEmail" placeholder="juan@email.com" autocomplete="email">
      </div>
    </div>

    <div class="login-field">
      <label>Phone Number *</label>
      <div class="field-wrap">
        <i class="fa-solid fa-phone"></i>
        <input type="text" id="phone" placeholder="09XXXXXXXXX" autocomplete="tel">
      </div>
    </div>

    <div class="form-row-2">
      <div class="login-field">
        <label>Password *</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="regPassword" placeholder="Min. 6 chars" autocomplete="new-password">
        </div>
      </div>
      <div class="login-field">
        <label>Confirm Password *</label>
        <div class="field-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Re-enter"
                 onkeydown="if(event.key==='Enter') registerUser()" autocomplete="new-password">
        </div>
      </div>
    </div>

    <button class="login-btn" id="registerBtn" onclick="registerUser()">
      <i class="fa-solid fa-user-plus"></i> Sign Up
    </button>

    <div class="login-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>

  </div>
</div>

<div id="toast-container"></div>
<script>
function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
function showSuccess(msg) {
  document.getElementById('successText').textContent = msg;
  document.getElementById('successMsg').classList.add('show');
}

function fieldErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('field-error');
  // Remove old error msg if present
  const old = el.parentNode.parentNode.querySelector('.field-err-msg');
  if (old) old.remove();
  const d = document.createElement('div');
  d.className = 'field-err-msg';
  d.textContent = msg;
  el.parentNode.parentNode.appendChild(d);
}

function clearErrors() {
  hideError();
  ['firstName','lastName','regEmail','phone','regPassword','confirmPassword'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('field-error');
  });
  document.querySelectorAll('.field-err-msg').forEach(e => e.remove());
}

async function registerUser() {
  clearErrors();

  const first_name = document.getElementById('firstName').value.trim();
  const last_name  = document.getElementById('lastName').value.trim();
  const email      = document.getElementById('regEmail').value.trim();
  const phone      = document.getElementById('phone').value.trim();
  const password   = document.getElementById('regPassword').value;
  const confirm    = document.getElementById('confirmPassword').value;

  let valid = true;
  if (!first_name) { fieldErr('firstName', 'Required.'); valid = false; }
  if (!last_name)  { fieldErr('lastName',  'Required.'); valid = false; }
  if (!email)      { fieldErr('regEmail',  'Required.'); valid = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                   { fieldErr('regEmail',  'Enter a valid email.'); valid = false; }
  if (!phone)      { fieldErr('phone', 'Required.'); valid = false; }
  else if (!/^(09|\+639)\d{9}$/.test(phone.replace(/\s/g,'')))
                   { fieldErr('phone', 'Format: 09XXXXXXXXX'); valid = false; }
  if (!password)   { fieldErr('regPassword', 'Required.'); valid = false; }
  else if (password.length < 6)
                   { fieldErr('regPassword', 'Min. 6 characters.'); valid = false; }
  if (password && confirm !== password)
                   { fieldErr('confirmPassword', 'Passwords do not match.'); valid = false; }

  if (!valid) return;

  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account…';

  try {
    const res  = await fetch('/api/auth/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ first_name, last_name, email, phone, password })
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess(data.message || 'Account created! Redirecting to login…');
      setTimeout(() => { window.location.href = '/login'; }, 1600);
    } else {
      showError(data.error || 'Registration failed. Please try again.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Sign Up';
    }
  } catch (e) {
    showError('Server error. Make sure the server is running.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Sign Up';
  }
}
</script>
</body>
</html>
