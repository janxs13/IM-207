<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — BusBook</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/user.css">
<style>
body {
  margin:0;
  min-height:100vh;
  background: url("https://images.unsplash.com/photo-1544620347-c4fd4a3d5957") no-repeat center center/cover;
  display:flex;
  flex-direction:column;
}
.login-overlay {
  position:fixed;inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,0.65) 0%,rgba(20,10,0,0.55) 100%);
  z-index:0;
}
.login-wrap {
  position:relative;z-index:1;
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.login-card {
  width:100%;max-width:380px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  padding:40px 36px;
  color:#fff;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.login-logo {
  text-align:center;margin-bottom:28px;
}
.login-logo .logo-icon {
  width:56px;height:56px;background:var(--brand);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin:0 auto 10px;
  box-shadow:0 4px 16px rgba(244,162,97,0.45);
}
.login-logo h2 {
  font-family:var(--font-display);font-size:22px;font-weight:800;color:#fff;margin:0 0 4px;
}
.login-logo p {font-size:13px;color:rgba(255,255,255,0.6);margin:0;}

.login-field {
  margin-bottom:14px;
}
.login-field label {
  display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.7);
  margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;
}
.login-field .field-wrap {position:relative;}
.login-field .field-wrap i {
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--brand);font-size:14px;
}
.login-field input {
  width:100%;padding:12px 14px 12px 38px;
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.18);
  border-radius:10px;color:#fff;font-size:14px;
  font-family:var(--font-body);outline:none;
  transition:border-color 0.15s,background 0.15s;
  box-sizing:border-box;
}
.login-field input::placeholder{color:rgba(255,255,255,0.4);}
.login-field input:focus {
  border-color:var(--brand);
  background:rgba(255,255,255,0.15);
}
.login-btn {
  width:100%;padding:13px;margin-top:6px;
  background:var(--brand);color:#fff;border:none;border-radius:10px;
  font-family:var(--font-body);font-size:15px;font-weight:700;
  cursor:pointer;transition:all 0.18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{background:var(--brand-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(244,162,97,0.4);}
.login-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}

.login-footer {
  text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.6);
}
.login-footer a {color:var(--brand);text-decoration:none;font-weight:600;}
.login-footer a:hover{text-decoration:underline;}

.error-msg {
  background:rgba(239,68,68,0.18);border:1px solid rgba(239,68,68,0.35);
  color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;
  margin-bottom:14px;display:none;align-items:center;gap:8px;
}
.error-msg.show{display:flex;}

.topbar-login {
  position:relative;z-index:2;display:flex;align-items:center;
  padding:16px 28px;
}
.topbar-login a {
  display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.85);
  text-decoration:none;font-size:14px;font-weight:600;
}
.topbar-login a:hover{color:#fff;}
</style>
</head>
<body>
<div class="login-overlay"></div>

<div class="topbar-login">
  <a href="/"><i class="fa-solid fa-bus" style="color:var(--brand);"></i> BusBook</a>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"><i class="fa-solid fa-bus" style="color:#fff;"></i></div>
      <h2>Welcome Back</h2>
      <p>Sign in to your BusBook account</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="fa-solid fa-circle-xmark"></i>
      <span id="errorText">Invalid credentials.</span>
    </div>

    <div class="login-field">
      <label>Email Address</label>
      <div class="field-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
      </div>
    </div>

    <div class="login-field">
      <label>Password</label>
      <div class="field-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') loginUser()">
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="loginUser()">
      <i class="fa-solid fa-right-to-bracket"></i> Sign In
    </button>

    <div class="login-footer">
      <a href="/forgot-password" style="color:rgba(255,255,255,.5);font-size:12px;">Forgot password?</a>
    </div>
    <div class="login-footer">
      Don't have an account? <a href="/register">Create one free</a>
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

async function loginUser() {
  hideError();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) { showError('Please fill in all fields.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('currentUser',  JSON.stringify(data.user));
      localStorage.setItem('access_token', data.access_token);
      localStorage.setItem('authToken',    data.access_token); // backward compat
      sessionStorage.setItem('justLoggedIn', '1'); // triggers bus info popup
      window.location.href = data.user.role === 'admin' ? '/admin' : '/';
    } else {
      showError(data.error || data.message || 'Invalid email or password.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
    }
  } catch (err) {
    showError('Server error. Please make sure the server is running.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
  }
}
</script>
<div id="toast-container"></div>
</body>
</html>
