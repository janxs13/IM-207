<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt — BusBook</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/user.css">
<style>
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.info-value{font-size:14px;font-weight:600;color:var(--text-1);text-align:right;}
.btn-primary{padding:12px 20px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .15s;}
.btn-primary:hover{background:var(--brand-dark);transform:translateY(-1px);}
.btn-secondary{padding:12px 20px;background:var(--surface2);color:var(--text-1);border:1px solid var(--border-dark);border-radius:10px;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
.btn-secondary:hover{background:var(--border);}
</style>
</head>
<body>
<div class="passenger-layout">
  <nav class="topnav">
    <a href="/" class="topnav-brand">
      <div class="t-icon"><i class="fa-solid fa-bus" style="font-size:16px;color:#fff;"></i></div>
      <span>BusBook</span>
    </a>
    <a href="/book"><i class="fa-solid fa-ticket"></i> Book</a>
    <a href="/routes"><i class="fa-solid fa-map"></i> Routes</a>
    <a href="/profile"><i class="fa-solid fa-user"></i> Profile</a>
    <a href="/login" onclick="Auth.logout();return false;" class="nav-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </nav>

  <div class="page-content" style="max-width:540px;">

    <div id="loadingState" style="text-align:center;padding:60px 20px;">
      <div class="spinner"></div>
      <p style="color:var(--text-2);margin-top:12px;font-size:14px;">Loading receipt…</p>
    </div>

    <div id="receiptCard" style="display:none;">
      <div style="text-align:center;padding:40px 24px 28px;">
        <div style="width:64px;height:64px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
          <i class="fa-solid fa-circle-check" style="font-size:32px;color:#3B6D11;"></i>
        </div>
        <h1 style="font-family:var(--font-display);font-size:22px;font-weight:800;margin-bottom:6px;">Payment Successful!</h1>
        <p style="font-size:14px;color:var(--text-2);">Your booking has been confirmed. Safe travels!</p>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-header">
          <span class="card-title"><i class="fa-solid fa-receipt" style="color:var(--brand);"></i> Booking Receipt</span>
          <span id="rcBookingCode" class="badge" style="font-family:monospace;font-size:13px;letter-spacing:.05em;"></span>
        </div>
        <div class="card-body">
          <div class="info-row"><span class="info-label"><i class="fa-solid fa-route" style="color:var(--brand);width:14px;"></i> Route</span><span class="info-value" id="rcRoute">—</span></div>
          <div class="info-row"><span class="info-label"><i class="fa-solid fa-calendar" style="color:var(--brand);width:14px;"></i> Travel Date</span><span class="info-value" id="rcDate">—</span></div>
          <div class="info-row"><span class="info-label"><i class="fa-solid fa-clock" style="color:var(--brand);width:14px;"></i> Departure</span><span class="info-value" id="rcDeparture">—</span></div>
          <div class="info-row"><span class="info-label"><i class="fa-solid fa-couch" style="color:var(--brand);width:14px;"></i> Seat(s)</span><span class="info-value" id="rcSeat">—</span></div>
          <div class="info-row"><span class="info-label"><i class="fa-solid fa-users" style="color:var(--brand);width:14px;"></i> Passengers</span><span class="info-value" id="rcPax">—</span></div>
          <div style="border-top:1px solid var(--border);margin:14px 0 0;padding-top:14px;">
            <div class="info-row"><span class="info-label"><i class="fa-solid fa-wallet" style="color:var(--brand);width:14px;"></i> Payment Method</span><span class="info-value" id="rcMethod">—</span></div>
            <div class="info-row"><span class="info-label"><i class="fa-solid fa-hashtag" style="color:var(--brand);width:14px;"></i> Reference No.</span><span class="info-value" id="rcRef" style="font-family:monospace;font-size:13px;">—</span></div>
            <div class="info-row" style="margin-top:8px;"><span class="info-label" style="font-size:15px;font-weight:700;color:var(--text-1);">Total Amount</span><span class="info-value" id="rcAmount" style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--brand);">—</span></div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:12px;margin-bottom:32px;">
        <button onclick="goToTicket()" class="btn-primary" style="flex:1;"><i class="fa-solid fa-ticket"></i> View My Ticket</button>
        <button onclick="window.location.href='/book'" class="btn-secondary" style="flex:1;"><i class="fa-solid fa-plus"></i> Book Another</button>
      </div>
    </div>

    <div id="errorState" style="display:none;text-align:center;padding:60px 24px;">
      <i class="fa-solid fa-circle-exclamation" style="font-size:40px;color:var(--text-3);margin-bottom:16px;display:block;"></i>
      <p style="color:var(--text-2);font-size:14px;" id="errorMsg">Could not load receipt details.</p>
      <a href="/profile" style="display:inline-block;margin-top:16px;font-size:14px;color:var(--brand);">View My Bookings</a>
    </div>

  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
if (!Auth.requireLogin()) {}

document.addEventListener('DOMContentLoaded', loadReceipt);

async function loadReceipt() {
  const params      = new URLSearchParams(window.location.search);
  const bookingCode = params.get('code') || localStorage.getItem('lastBookingCode');

  if (!bookingCode) {
    showError('No booking code found. Please check your profile for your bookings.');
    return;
  }

  try {
    const res = await fetch('/api/bookings/code/' + bookingCode, { headers: Auth.headers() });
    if (res.status === 401) { Auth.logout(); return; }
    if (!res.ok) {
      const d = await res.json();
      showError(d.error || 'Booking not found.');
      return;
    }
    const { booking } = await res.json();
    renderReceipt(booking);
  } catch (e) {
    const method = localStorage.getItem('receiptPayment');
    const ref    = localStorage.getItem('receiptRef');
    const amount = localStorage.getItem('receiptAmount');
    const from   = localStorage.getItem('selectedFrom');
    const to     = localStorage.getItem('selectedTo');
    if (method && ref) {
      document.getElementById('rcRoute').textContent      = from && to ? from + ' → ' + to : '—';
      document.getElementById('rcDate').textContent       = '—';
      document.getElementById('rcDeparture').textContent  = '—';
      document.getElementById('rcSeat').textContent       = '—';
      document.getElementById('rcPax').textContent        = '1';
      document.getElementById('rcMethod').textContent     = method;
      document.getElementById('rcRef').textContent        = ref;
      document.getElementById('rcAmount').textContent     = '₱' + parseFloat(amount || 0).toFixed(2);
      document.getElementById('rcBookingCode').textContent = bookingCode || '—';
      showReceipt();
    } else {
      showError('Could not load receipt details. Check your profile for bookings.');
    }
  }
}

function renderReceipt(b) {
  document.getElementById('rcBookingCode').textContent  = b.booking_code || '—';
  document.getElementById('rcRoute').textContent        = b.route || '—';
  document.getElementById('rcDate').textContent         = b.travel_date || '—';
  document.getElementById('rcDeparture').textContent    = b.departure_time || b.time || '—';
  document.getElementById('rcSeat').textContent         = b.seat_number || 'Not yet assigned';
  document.getElementById('rcPax').textContent          = b.passenger_count || 1;
  document.getElementById('rcMethod').textContent       = b.payment_method || '—';
  document.getElementById('rcRef').textContent          = b.reference_no || '—';
  document.getElementById('rcAmount').textContent       = '₱' + parseFloat(b.amount || b.fare || 0).toFixed(2);
  showReceipt();
}

function showReceipt() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('receiptCard').style.display  = 'block';
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorMsg').textContent       = msg;
  document.getElementById('errorState').style.display  = 'block';
}

function goToTicket() {
  const params      = new URLSearchParams(window.location.search);
  const bookingCode = params.get('code') || localStorage.getItem('lastBookingCode');
  window.location.href = bookingCode ? '/ticket?code=' + bookingCode : '/ticket';
}
</script>
</body>
</html>
