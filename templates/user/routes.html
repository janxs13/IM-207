<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Routes — BusBook</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/user.css">
</head>
<body>
<div class="passenger-layout">
  <nav class="topnav">
    <a href="/" class="topnav-brand">
      <div class="t-icon"><i class="fa-solid fa-bus" style="font-size:16px;color:#fff;"></i></div>
      <span>BusBook</span>
    </a>
    <a href="/book"><i class="fa-solid fa-ticket"></i> Book</a>
    <a href="/routes" class="active"><i class="fa-solid fa-map"></i> Routes</a>
    <a href="/contact"><i class="fa-solid fa-envelope"></i> Contact</a>
    <a href="/about"><i class="fa-solid fa-circle-info"></i> About</a>
    <a href="/profile"><i class="fa-solid fa-user"></i> Profile</a>
    <a href="/login" onclick="localStorage.removeItem('currentUser')" class="nav-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </nav>

  <div class="page-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <div class="page-title"><i class="fa-solid fa-map-location-dot" style="color:var(--brand);margin-right:8px;"></i>Available Routes</div>
        <div class="page-subtitle">Browse all active bus schedules and fares</div>
      </div>
      <div class="search-bar">
        <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
        <input type="text" id="searchInput" placeholder="Search routes…" oninput="filterRoutes()">
      </div>
    </div>

    <div id="routeList">
      <div class="empty-state"><div class="spinner"></div><p style="margin-top:12px;">Loading routes…</p></div>
    </div>
  </div>

  <footer>BusBook &copy; 2026 &mdash; Safe travels!</footer>
</div>
<div id="toast-container"></div>
<script src="/static/js/auth.js"></script>
<script>
let allSchedules = [];

function filterRoutes() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderRoutes(allSchedules.filter(s => s.route.toLowerCase().includes(q)));
}

function renderRoutes(list) {
  const el = document.getElementById('routeList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">🗺️</span><p>No routes found.</p></div>';
    return;
  }
  el.innerHTML = list.map(s => {
    const parts = s.route.split(' - ');
    const seats = s.seats_available ?? s.available_seats ?? 0;
    const seatCls = seats > 10 ? 'badge-green' : seats > 3 ? 'badge-yellow' : 'badge-red';
    return `
    <div class="section-card" style="margin-bottom:14px;">
      <div style="padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
        <div style="display:flex;align-items:center;gap:24px;flex:1;min-width:0;">
          <div style="text-align:center;min-width:100px;">
            <div style="font-family:var(--font-display);font-size:17px;font-weight:800;">${parts[0]||s.route}</div>
            <div class="text-sm text-muted">${s.departure_time||'—'}</div>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:0;min-width:60px;">
            <div style="flex:1;height:2px;background:var(--border-dark);position:relative;">
              <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);padding:0 6px;color:var(--brand);font-size:13px;"><i class="fa-solid fa-bus"></i></div>
            </div>
          </div>
          <div style="text-align:center;min-width:100px;">
            <div style="font-family:var(--font-display);font-size:17px;font-weight:800;">${parts[1]||'—'}</div>
            <div class="text-sm text-muted">${s.arrival_time||'—'}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:16px;flex-shrink:0;">
          <span class="badge ${seatCls}">${seats} seats left</span>
          <div style="text-align:right;">
            <div style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--brand-darker);">₱${parseFloat(s.fare||s.price||0).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
          </div>
          <a href="/book">
            <button class="btn btn-primary" ${seats===0?'disabled style="opacity:0.5;"':''}>
              ${seats===0?'Full':'<i class="fa-solid fa-ticket"></i> Book Now'}
            </button>
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.onload = async function() {
  try {
    const res = await fetch('/api/schedules/');
    let data = await res.json();
    allSchedules = Array.isArray(data) ? data : (data.schedules || []);
    filterRoutes();
  } catch {
    document.getElementById('routeList').innerHTML = '<div class="empty-state"><p>Could not load routes.</p></div>';
  }
};
</script>
</body>
</html>
